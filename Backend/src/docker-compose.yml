version: '3.9'

services:
  backend:
    build: .
    container_name: ocr-django-backend
    volumes:
      - .:/app/backend    # sync local code with container
    ports:
      - "8000:8000"
    env_file:
      - ./.env            # for environment variables
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "